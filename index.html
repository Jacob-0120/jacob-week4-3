<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlapping Shapes Task</title>
    <style>
        /* 讓畫布居中，方便觀察 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        svg {
            background-color: white;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <svg width="400" height="300">
        
        <rect x="50" y="50" width="180" height="150" 
              fill="blue" 
              stroke="black" 
              stroke-width="5" />

        <circle cx="230" cy="130" r="70" 
                fill="yellow" 
                stroke="red" 
                stroke-width="5" />

    </svg>

</body>
</html>
