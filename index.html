<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlapping Shapes</title>
    <style>
        /* 讓畫面乾淨，形狀靠左上角顯示，如同作業截圖 */
        body {
            margin: 20px;
            background-color: white;
        }
    </style>
</head>
<body>

    <svg width="500" height="400">
        
        <rect x="20" y="20" width="200" height="180" 
              fill="blue" 
              stroke="black" 
              stroke-width="8" />

        <circle cx="190" cy="110" r="75" 
                fill="#ffff66" 
                stroke="#ee3322" 
                stroke-width="6" />

    </svg>

</body>
</html>
